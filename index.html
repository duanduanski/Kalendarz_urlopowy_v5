<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Urlopowy Pro v5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
            color: #1e293b;
            -webkit-tap-highlight-color: transparent;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* KLUCZOWA POPRAWKA CSS: minmax(0, 1fr) zapobiega rozpychaniu kolumn przez długi tekst */
        .calendar-grid {
            display: grid;
            grid-template-columns: 36px repeat(7, minmax(0, 1fr));
            gap: 2px;
        }

        .calendar-cell {
            aspect-ratio: 1/1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.15s ease;
            cursor: pointer;
            position: relative;
            min-width: 0; /* Pozwala siatce na poprawne kurczenie się elementów */
        }

        .week-num {
            background-color: #f1f5f9;
            color: #94a3b8;
            font-weight: 800;
            font-size: 0.95rem;
            cursor: default;
        }

        .day-cell { background-color: #ffffff; border: 1px solid #f1f5f9; }
        .day-cell:hover { border-color: #6366f1; transform: translateY(-1px); }
        
        .vacation-day { background-color: #e0e7ff !important; color: #4338ca; font-weight: 700; }
        .sat-day { background-color: #fffbeb; color: #b45309; }
        .sun-day, .holiday { background-color: #fef2f2; color: #b91c1c; }
        .today { box-shadow: inset 0 0 0 2px #1e293b; font-weight: 800; }
        
        .selected-point { background-color: #6366f1 !important; color: white !important; z-index: 10; }
        .in-selection-range { background-color: #e0e7ff !important; border-radius: 0; }

        .holiday-label { 
            font-size: 8px; 
            text-align: center; 
            line-height: 1; 
            margin-top: 2px;
            font-weight: 600;
            width: 100%;
            padding: 0 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis; /* Dodaje '...' gdy nazwa święta jest zbyt długa */
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
        }
    </style>
</head>
<body class="pb-10">

    <div class="max-w-xl mx-auto px-4 pt-6">
        <header class="mb-6 flex justify-between items-start">
            <div>
                <h1 class="text-2xl font-800 tracking-tight text-slate-900">Planner Urlopowy</h1>
                <p id="full-date-display" class="text-slate-500 text-xl font-medium"></p>
            </div>
            <button onclick="goToToday()" class="text-s font-bold bg-white border border-slate-200 px-3 py-2 rounded-lg hover:bg-slate-50 transition-colors shadow-sm">
                Dzisiaj
            </button>
        </header>

        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="glass-card p-4 text-center">
                <span class="block text-[12px] font-bold text-slate-400 uppercase tracking-wider mb-1">Pula dni</span>
                <input type="number" id="total-pool" class="text-2xl font-extrabold w-full text-center bg-transparent focus:outline-none" value="26">
            </div>
            <div class="glass-card p-4 text-center border-b-4 border-indigo-500">
                <span class="block text-[12px] font-bold text-slate-400 uppercase tracking-wider mb-1">Pozostało</span>
                <span id="remaining-days" class="text-2xl font-extrabold text-indigo-600">0</span>
            </div>
        </div>

        <div class="glass-card overflow-hidden mb-6">
            <div class="flex justify-between items-center bg-slate-900 p-3 text-white">
                <button onclick="moveMonth(-1)" class="hover:bg-slate-700 p-2 rounded-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                </button>
                <h2 id="month-year-label" class="font-bold text-sm uppercase tracking-widest"></h2>
                <button onclick="moveMonth(1)" class="hover:bg-slate-700 p-2 rounded-lg">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
                </button>
            </div>

            <div class="p-3">
                <div class="calendar-grid mb-1">
                    <div class="text-[11px] font-black text-slate-300 text-center uppercase">Tyd</div>
                    <div class="text-[11px] font-bold text-slate-400 text-center">PN</div>
                    <div class="text-[11px] font-bold text-slate-400 text-center">WT</div>
                    <div class="text-[11px] font-bold text-slate-400 text-center">ŚR</div>
                    <div class="text-[11px] font-bold text-slate-400 text-center">CZ</div>
                    <div class="text-[11px] font-bold text-slate-400 text-center">PT</div>
                    <div class="text-[11px] font-bold text-rose-400 text-center">SO</div>
                    <div class="text-[11px] font-bold text-rose-400 text-center">ND</div>
                </div>
                <div id="calendar-content" class="calendar-grid"></div>
            </div>
        </div>

        <div class="glass-card p-5 mb-6">
            <div class="flex items-center justify-between mb-4">
                <h3 class="font-bold text-slate-800 text-m flex items-center">
                    <span class="w-2 h-2 bg-indigo-500 rounded-full mr-2"></span>
                    Dodaj urlop
                </h3>
                <span id="selection-info" class="text-[11px] font-bold text-indigo-500 uppercase">Kliknij dni w kalendarzu</span>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <input type="date" id="date-start" class="w-full rounded-xl p-2.5 text-xs font-semibold bg-slate-50 border-slate-200 focus:ring-2 ring-indigo-100 outline-none">
                <input type="date" id="date-end" class="w-full rounded-xl p-2.5 text-xs font-semibold bg-slate-50 border-slate-200 focus:ring-2 ring-indigo-100 outline-none">
            </div>
            <button onclick="addNewVacation()" class="btn-primary w-full text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 uppercase tracking-wider text-[14px]">
                Zatwierdź wybrany termin
            </button>
        </div>

        <div id="vacation-list" class="space-y-3"></div>
    </div>

    <script>
        let appState = {
            pool: 26,
            vacations: [],
            viewDate: new Date(),
            selection: { start: null, end: null }
        };

        const fixedHolidays = { "01-01": "Nowy Rok", "01-06": "Trzech Króli", "05-01": "Święto Pracy", "05-03": "Konstytucji", "08-15": "Wniebowzięcie", "11-01": "Wszystkich Św.", "11-11": "Niepodległości", "12-25": "Boże Nar.", "12-26": "Boże Nar." };
        const movingHolidays2026 = { "2026-04-05": "Wielkanoc", "2026-04-06": "Lany Pon.", "2026-05-24": "Zesłanie Ducha", "2026-06-04": "Boże Ciało" };

        // Bezpieczna funkcja do formatu YYYY-MM-DD niezależna od ustawień regionalnych przeglądarki
        function getLocalISOString(date) {
            const pad = (n) => n.toString().padStart(2, '0');
            return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
        }

        function getHolidayName(date) {
            const iso = getLocalISOString(date);
            return movingHolidays2026[iso] || fixedHolidays[iso.substring(5)] || null;
        }

        function getISOWeek(d) {
            const tempDate = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 12, 0, 0);
            tempDate.setDate(tempDate.getDate() + 4 - (tempDate.getDay() || 7));
            const yearStart = new Date(tempDate.getFullYear(), 0, 1, 12, 0, 0);
            return Math.ceil((((tempDate - yearStart) / 86400000) + 1) / 7);
        }

        function init() {
            const saved = localStorage.getItem('vacation_v3_state');
            if (saved) {
                const parsed = JSON.parse(saved);
                appState.pool = parsed.pool || 26;
                appState.vacations = parsed.vacations || [];
            }
            document.getElementById('total-pool').value = appState.pool;
            updateTopDisplay();
            renderAll();
        }

        function updateTopDisplay() {
            const now = new Date();
            document.getElementById('full-date-display').innerText = now.toLocaleDateString('pl-PL', { weekday: 'long', day: 'numeric', month: 'long' });
        }

        function goToToday() {
            appState.viewDate = new Date();
            renderAll();
        }

        function moveMonth(offset) {
            appState.viewDate.setMonth(appState.viewDate.getMonth() + offset);
            renderAll();
        }

        function handleDateClick(iso) {
            if (!appState.selection.start || (appState.selection.start && appState.selection.end)) {
                appState.selection.start = iso;
                appState.selection.end = null;
            } else {
                if (iso < appState.selection.start) {
                    appState.selection.end = appState.selection.start;
                    appState.selection.start = iso;
                } else {
                    appState.selection.end = iso;
                }
            }
            document.getElementById('date-start').value = appState.selection.start;
            document.getElementById('date-end').value = appState.selection.end || appState.selection.start;
            renderAll();
        }

        function renderCalendar() {
            const container = document.getElementById('calendar-content');
            container.innerHTML = '';
            
            const year = appState.viewDate.getFullYear();
            const month = appState.viewDate.getMonth();
            const todayStr = getLocalISOString(new Date());
            
            const monthNames = ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"];
            document.getElementById('month-year-label').innerText = `${monthNames[month]} ${year}`;

            // Inicjalizacja z godziną 12:00 chroni przed bugami ze zmianą czasu DST (letni/zimowy)
            const firstDayOfMonth = new Date(year, month, 1, 12, 0, 0);
            const lastDayOfMonth = new Date(year, month + 1, 0, 12, 0, 0);
            
            let currentDrawingDate = new Date(firstDayOfMonth);
            let startOffset = currentDrawingDate.getDay() === 0 ? 6 : currentDrawingDate.getDay() - 1;
            currentDrawingDate.setDate(currentDrawingDate.getDate() - startOffset);

            while (currentDrawingDate <= lastDayOfMonth || currentDrawingDate.getDay() !== 1) {
                if (currentDrawingDate.getDay() === 1) {
                    container.innerHTML += `<div class="calendar-cell week-num">${getISOWeek(currentDrawingDate)}</div>`;
                }

                const dateISO = getLocalISOString(currentDrawingDate);
                const isCurrentMonth = currentDrawingDate.getMonth() === month;
                
                if (!isCurrentMonth) {
                    container.innerHTML += `<div class="calendar-cell"></div>`;
                } else {
                    const holiday = getHolidayName(currentDrawingDate);
                    const isVacation = appState.vacations.some(v => dateISO >= v.start && dateISO <= v.end);
                    const isToday = dateISO === todayStr;
                    const isSat = currentDrawingDate.getDay() === 6;
                    const isSun = currentDrawingDate.getDay() === 0;
                    
                    const isSelStart = dateISO === appState.selection.start;
                    const isSelEnd = dateISO === appState.selection.end;
                    const isInSelRange = appState.selection.start && appState.selection.end && 
                                       dateISO > appState.selection.start && dateISO < appState.selection.end;

                    let classes = `calendar-cell day-cell `;
                    if (isSat) classes += "sat-day ";
                    if (isSun || holiday) classes += "sun-day ";
                    if (isVacation) classes += "vacation-day ";
                    if (isToday) classes += "today ";
                    if (isSelStart || isSelEnd) classes += "selected-point ";
                    if (isInSelRange) classes += "in-selection-range ";

                    container.innerHTML += `
                        <div class="${classes}" onclick="handleDateClick('${dateISO}')" title="${holiday || ''}">
                            <span class="font-bold">${currentDrawingDate.getDate()}</span>
                            ${holiday ? `<span class="holiday-label">${holiday}</span>` : ''}
                        </div>`;
                }

                currentDrawingDate.setDate(currentDrawingDate.getDate() + 1);
            }
        }

        function addNewVacation() {
            const start = document.getElementById('date-start').value;
            const end = document.getElementById('date-end').value;
            if (!start || !end) return;

            let count = 0;
            // Dodajemy T12:00:00 aby bezpiecznie iterować po datach
            let cur = new Date(start + "T12:00:00");
            const stop = new Date(end + "T12:00:00");
            while (cur <= stop) {
                if (!getHolidayName(cur) && cur.getDay() !== 0 && cur.getDay() !== 6) count++;
                cur.setDate(cur.getDate() + 1);
            }

            // Fallback dla starszych przeglądarek - start nie ma T12 na wyjściu z inputa
            appState.vacations.push({ id: Date.now(), start, end, count, week: getISOWeek(new Date(start + "T12:00:00")) });
            appState.selection = { start: null, end: null };
            saveAndRender();
        }

        function deleteVacation(id) {
            appState.vacations = appState.vacations.filter(v => v.id !== id);
            saveAndRender();
        }

        function saveAndRender() {
            appState.pool = parseInt(document.getElementById('total-pool').value) || 0;
            localStorage.setItem('vacation_v3_state', JSON.stringify(appState));
            renderAll();
        }

        function renderAll() {
            renderCalendar();
            const used = appState.vacations.reduce((acc, v) => acc + v.count, 0);
            document.getElementById('remaining-days').innerText = appState.pool - used;

            const list = document.getElementById('vacation-list');
            list.innerHTML = `<h3 class="text-[12px] font-black text-slate-400 uppercase tracking-widest ml-1 mb-2">Zaplanowane urlopy</h3>`;
            
            appState.vacations.sort((a, b) => a.start.localeCompare(b.start)).forEach(v => {
                list.innerHTML += `
                    <div class="glass-card p-3 flex justify-between items-center bg-white border-l-4 border-indigo-500">
                        <div>
                            <p class="text-s font-bold text-slate-800">${v.start.split('-').reverse().join('.')} — ${v.end.split('-').reverse().join('.')}</p>
                            <p class="text-[12px] font-bold text-slate-400 uppercase">Dni: ${v.count} • Tydzień ${v.week}</p>
                        </div>
                        <button onclick="deleteVacation(${v.id})" class="text-rose-400 hover:text-rose-600 p-2">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                        </button>
                    </div>`;
            });
        }

        document.getElementById('total-pool').addEventListener('change', saveAndRender);
        init();
    </script>
</body>
</html>
